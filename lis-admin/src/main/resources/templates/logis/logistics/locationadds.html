<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('多订单物流新增位置')" />
    <th:block th:include="include :: datetimepicker-css" />
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal m" id="form-location-add">
        <div class="form-group">
            <label class="col-sm-3 control-label">物流ID：</label>
            <div class="col-sm-8">
                <input name="logisticsIds" th:value="*{id}" class="form-control" type="text" readonly>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">当前位置：</label>
            <div class="col-sm-8">
                <input name="currentLocation" class="form-control" type="text" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">物流状态：</label>
            <div class="col-sm-8">
                <select name="orderStatus" class="form-control m-b" th:with="type=${@dict.getType('order_status')}" required>
                    <option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}"></option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">当前时间：</label>
            <div class="col-sm-8">
                <div class="input-group date">
                    <input id="shippingTime" name="currentsTime" class="form-control" placeholder="yyyy-MM-dd HH:mm:ss" type="text">
                    <span class="input-group-addon"><i class="fa fa-calendar"></i></span>
                </div>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">备注信息：</label>
            <div class="col-sm-8">
                <input name="remark" class="form-control" type="text">
            </div>
        </div>
    </form>
</div>
<th:block th:include="include :: footer" />
<th:block th:include="include :: datetimepicker-js" />
<script th:inline="javascript">
    var prefix = ctx + "logis/location";
    $("#form-location-add").validate({
        focusCleanup: true
    });

    layui.use('laydate', function(){
        var laydate = layui.laydate;

        laydate.render({
            elem: '#shippingTime',
            type: 'datetime',
            trigger: 'click'
        });
    });

    function submitHandler() {
        if ($.validate.form()) {
            $.operate.save(prefix + "/locationaddsSave", $('#form-location-add').serialize());
        }
    }
</script>
</body>
</html>
