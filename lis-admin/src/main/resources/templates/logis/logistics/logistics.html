<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('物流列表')" />
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12 search-collapse">
            <form id="formId" autocomplete="off">
                <div class="select-list">
                    <ul>
                        <li>
                            <label>订单编号：</label>
                            <input type="text" name="orderNumber" />
                        </li>
                        <li class="select-time">
                            <label>收货时间：</label>
                            <input type="text" class="time-input" placeholder="开始时间" name="params[beginReceiveTime]" />
                            <span>-</span>
                            <input type="text" class="time-input" placeholder="结束时间" name="params[endReceiveTime]" />
                        </li>
                        <li>
                            <label>收货电话：</label>
                            <input type="text" name="phoneNumber"/>
                        </li>
                        <li>
                            <label>收货姓名：</label>
                            <input type="text" name="onsignee" />
                        </li>
                        <li>
                            <label>目的国家：</label>
                            <input type="text" name="shippingAddress" />
                        </li>
                        <li class="select-time">
                            <label>发货时间：</label>
                            <input type="text" class="time-input" placeholder="开始时间" name="params[beginShippingTime]" />
                            <span>-</span>
                            <input type="text" class="time-input" placeholder="结束时间" name="params[endShippingTime]" />
                        </li>
                        <li>
                            <label>订单商品：</label>
                            <input type="text" name="orderGoods" />
                        </li>
                        <li>
                            <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                            <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                        </li>
                    </ul>
                </div>
            </form>
        </div>

        <div class="btn-group-sm" id="toolbar" role="group">
            <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="logis:logistics:add">
                <i class="fa fa-plus"></i> 添加
            </a>
            <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="logis:logistics:edit">
                <i class="fa fa-edit"></i> 修改
            </a>
            <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="logis:logistics:remove">
                <i class="fa fa-remove"></i> 删除
            </a>
            <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="logis:logistics:export">
                <i class="fa fa-download"></i> 导出
            </a>
            <a class="btn btn-info" onclick="$.table.importExcel()" shiro:hasPermission="logis:logistics:import">
                <i class="fa fa-download"></i> 导入物流信息
            </a>
            <a class="btn btn-danger" onclick="$.table.importExcel2()" shiro:hasPermission="logis:logisticsLocation:import">
                <i class="fa fa-download"></i> 导入物流位置
            </a>
            <a class="btn btn-default" onclick="$.operate.edit2()" shiro:hasPermission="logis:logisticsLocation:multilocate">
                <i class="fa fa-download"></i> 多选订单并定位
            </a>
        </div>
        <div class="col-sm-12 select-table table-striped">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>
<th:block th:include="include :: footer" />
<script th:inline="javascript">
    var editFlag = [[${@permission.hasPermi('logis:logistics:edit')}]];
    var removeFlag = [[${@permission.hasPermi('logis:logistics:remove')}]];
    var prefix = ctx + "logis/logistics";

    $(function() {
        var options = {
            url: prefix + "/list",
            createUrl: prefix + "/add",
            createLocationAddUrl: prefix + "/locationadds/{id}",
            updateUrl: prefix + "/edit/{id}",
            removeUrl: prefix + "/remove",
            exportUrl: prefix + "/export",
            importUrl: prefix + "/importData",
            importTemplateUrl: prefix + "/importTemplate",
            importUrl2: prefix + "/importData2",
            importTemplateUrl2: prefix + "/importTemplate2",
            modalName: "物流",
            pageList: [10, 25, 50, 100, 200],
            columns: [{
                checkbox: true
            },
                {
                    field: 'id',
                    title: '物流ID',
                    visible: false
                },
                {
                    field: 'orderNumber',
                    title: '订单编号'
                },
                {
                    field: 'phoneNumber',
                    title: '收货人电话'
                },
                {
                    field: 'onsignee',
                    title: '收货人姓名'
                },
                {
                    field: 'shippingAddress',
                    title: '目的国家'
                },
                {
                    field: 'shippingTime',
                    title: '订单发货时间'
                },
                {
                    field: 'receiveTime',
                    title: '订单收货时间'
                },
                {
                    field: 'orderGoods',
                    title: '订单商品'
                },
                {
                    field: 'orderAmount',
                    title: '订单金额'
                },
                {
                    field: 'remark',
                    title: '备注',
                    formatter: function(value, row, index) {
                        return $.table.tooltip(value);
                    }
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.id + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                        actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.id + '\')"><i class="fa fa-remove"></i>删除</a>');
                        return actions.join('');
                    }
                }]
        };
        $.table.init(options);
    });
</script>
</body>

<!-- 导入区域 -->
<script id="importTpl" type="text/template">
    <form enctype="multipart/form-data" class="mt20 mb10">
        <div class="col-xs-offset-1">
            <input type="file" id="file" name="file"/>
            <div class="mt10 pt5">
                <input type="checkbox" id="updateSupport" name="updateSupport" title="如果订单信息已经存在，更新这条数据。"> 是否更新已经存在的物流数据
                &nbsp;	<a onclick="$.table.importTemplate()" class="btn btn-default btn-xs"><i class="fa fa-file-excel-o"></i> 下载模板</a>
            </div>
            <font color="red" class="pull-left mt10">
                提示：仅允许导入“xls”或“xlsx”格式文件！
            </font>
        </div>
    </form>
</script>

<!-- 导入区域 -->
<script id="importTpl2" type="text/template">
    <form enctype="multipart/form-data" class="mt20 mb10">
        <div class="col-xs-offset-1">
            <input type="file" id="file2" name="file2"/>
            <div class="mt10 pt5">
                <input type="checkbox" id="updateSupport2" name="updateSupport2" title="如果系统中存在数据，则删除更新Excel数据。"> 一键更新，注意：将删除并替换现有数据
                &nbsp;
                <a onclick="$.table.importTemplate2()" class="btn btn-default btn-xs"><i class="fa fa-file-excel-o"></i> 下载模板</a>
            </div>
            <font color="red" class="pull-left mt10">
                提示：仅允许导入“xls”或“xlsx”格式文件！
            </font>
        </div>
    </form>
</script>

</html>
