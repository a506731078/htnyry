<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('修改物流')" />
    <th:block th:include="include :: datetimepicker-css" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-logistics-edit" th:object="${logistics}">
            <h4 class="form-header h4">物流信息</h4>
            <input name="id" th:field="*{id}" type="hidden">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">订单编号：</label>
                <div class="col-sm-8">
                    <input name="orderNumber" th:field="*{orderNumber}" class="form-control" type="text" required readonly>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">收货人电话：</label>
                <div class="col-sm-8">
                    <input name="phoneNumber" th:field="*{phoneNumber}" class="form-control" type="text" required>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">收货人姓名：</label>
                <div class="col-sm-8">
                    <input name="onsignee" th:field="*{onsignee}" class="form-control" type="text" required>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">目的国家：</label>
                <div class="col-sm-8">
                    <input name="shippingAddress" th:field="*{shippingAddress}" class="form-control" type="text" required>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">发货时间：</label>
                <div class="col-sm-8">
                    <div class="input-group date">
                        <input id="shippingTime" name="shippingTime" th:value="${#dates.format(logistics.shippingTime, 'yyyy-MM-dd HH:mm:ss')}" class="form-control" placeholder="yyyy-MM-dd" type="text">
                        <span class="input-group-addon"><i class="fa fa-calendar"></i></span>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">收货时间：</label>
                <div class="col-sm-8">
                    <div class="input-group date">
                        <input id="receiveTime" name="receiveTime" th:value="${#dates.format(logistics.receiveTime, 'yyyy-MM-dd HH:mm:ss')}" class="form-control" placeholder="yyyy-MM-dd" type="text">
                        <span class="input-group-addon"><i class="fa fa-calendar"></i></span>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">订单商品：</label>
                <div class="col-sm-8">
                    <input name="orderGoods" th:field="*{orderGoods}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">订单金额：</label>
                <div class="col-sm-8">
                    <input name="orderAmount" th:field="*{orderAmount}" class="form-control" type="text">
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">备注信息：</label>
                <div class="col-sm-8">
                    <input name="remark" th:field="*{remark}" class="form-control" type="text">
                </div>
            </div>
            <h4 class="form-header h4">物流位置信息</h4>
            <div class="row">
                <div class="col-sm-12">
                    <button type="button" class="btn btn-white btn-sm" onclick="addRow()"><i class="fa fa-plus"> 增加</i></button>
                    <button type="button" class="btn btn-white btn-sm" onclick="sub.delRow()"><i class="fa fa-minus"> 删除</i></button>
                    <div class="col-sm-12 select-table table-striped">
                        <table id="bootstrap-table"></table>
                    </div>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <th:block th:include="include :: datetimepicker-js" />
    <script th:inline="javascript">
        var orderStatusDatas = [[${@dict.getType('order_status')}]];
        var prefix = ctx + "logis/logistics";
        $("#form-logistics-edit").validate({
            focusCleanup: true
        });

        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save(prefix + "/edit", $('#form-logistics-edit').serialize());
            }
        }

        layui.use('laydate', function(){

            var laydate = layui.laydate;

            laydate.render({
                elem: '#shippingTime',
                type: 'datetime',
                trigger: 'click'
            });

            laydate.render({
                elem: '#receiveTime',
                type: 'datetime',
                trigger: 'click'
            });

        });
console.table([[${logistics.logisticsLocationList}]]);
        $(function() {
            var options = {
                data: [[${logistics.logisticsLocationList}]],
                pagination: false,
                showSearch: false,
                showRefresh: false,
                showToggle: false,
                showColumns: false,
                sidePagination: "client",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'index',
                    align: 'center',
                    title: "序号",
                    formatter: function (value, row, index) {
                        var columnIndex = $.common.sprintf("<input type='hidden' name='index' value='%s'>", $.table.serialNumber(index));
                        var columnId = $.common.sprintf("<input type='hidden' name='goods[%s].id' value='%s'>", index, row.id);
                        return columnIndex + $.table.serialNumber(index) + columnId;
                    }
                },
                {
                    field: 'currentLocation',
                    align: 'center',
                    title: '当前位置',
                    formatter: function(value, row, index) {
                        var html = $.common.sprintf("<input class='form-control currentLocation' type='text' name='logisticsLocationList[%s].currentLocation' value='%s'>", index, value);
                        return html;
                    }
                },
                {
                    field: 'remark',
                    align: 'center',
                    title: '备注信息',
                    formatter: function(value, row, index) {
                        var html = $.common.sprintf("<input class='form-control' type='text' name='logisticsLocationList[%s].remark' value='%s'>", index, value);
                        return html;
                    }
                },
                {
                    field: 'currentsTime',
                    align: 'center',
                    title: '当前时间',
                    formatter: function(value, row, index) {
                        var html = $.common.sprintf("<input class='form-control currentsTime' placeholder='yyyy-MM-dd HH:mm:ss' type='text' name='logisticsLocationList[%s].currentsTime' value='%s'>", index, value);
                        return html;
                    }
                },
                {
                    field: 'orderStatus',
                    align: 'center',
                    title: '物流状态',
                    formatter: function(value, row, index) {
                        const name = $.common.sprintf("logisticsLocationList[%s].orderStatus", index);
                        return '<div style="width:80px;">'+$.common.dictToSelect(orderStatusDatas, value, name)+'</div>';
                    }
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var value = $.common.isNotEmpty(row.index) ? row.index : $.table.serialNumber(index);
                        return '<a class="btn btn-danger btn-xs" href="javascript:void(0)" onclick="sub.delRowByIndex(\'' + value + '\')"><i class="fa fa-remove"></i>删除</a>';
                    }
                }]
            };
            $.table.init(options);
        });

        $.validator.addMethod("currentLocation", function(value, element) {
            return !this.optional(element);
        }, "");

        $.validator.addMethod("currentsTime", function(value, element) {
            return !this.optional(element);
        }, "");

        function addRow() {
            var count = $("#" + table.options.id).bootstrapTable('getData').length;
            var row = {
                index: $.table.serialNumber(count),
                currentLocation: "",
                currentsTime: [[${#dates.format(#dates.createNow(), 'yyyy-MM-dd HH:mm:ss')}]],
                orderStatus: "",
                remark: "",
            }
            sub.addRow(row);
        }

        $("#bootstrap-table").on("post-body.bs.table", function (e, args) {
            $("input[name$='currentsTime']").datetimepicker({
                format: "yyyy-mm-dd hh:ii:ss",
                autoclose: true,
                pickerPosition:'top-right'
            });
        });
    </script>
</body>
</html>
