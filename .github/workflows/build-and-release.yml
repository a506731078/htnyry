name: Build JAR Package and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - uses: actions/checkout@v4.1.7

    - name: Set up JDK 8
      uses: actions/setup-java@v4.2.1
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build with Maven
      run: mvn clean package -DskipTests
      env:
        MAVEN_OPTS: "-Xms512m -Xmx1024m"

    - name: Get short SHA
      id: get_sha
      run: echo "SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Get current date
      id: get_date
      run: echo "DATE=$(date +%Y%m%d)" >> $GITHUB_OUTPUT

    - name: Create release version
      id: get_version
      run: echo "VERSION=build-${{ steps.get_date.outputs.DATE }}-${{ steps.get_sha.outputs.SHA }}" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.get_version.outputs.VERSION }}
        name: LIS 物流系统 ${{ steps.get_version.outputs.VERSION }}
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          lis-admin/target/lis-admin.jar
        body: |
          ## 📦 LIS 物流系统 Build ${{ steps.get_version.outputs.VERSION }}

          ### 📋 变更日志
          - 构建时间: ${{ steps.get_date.outputs.DATE }}
          - 提交: ${{ steps.get_sha.outputs.SHA }}

          ### 🔧 部署方式
          
          **传统部署:**
          ```bash
          java -jar -Xmx1024M -Xms256M lis-admin.jar
          ```

          **Docker 部署:**
          ```bash
          docker-compose up -d
          ```

          默认管理员账号：`admin` / `admin123`
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}