name: Build and Release (JAR + Docker)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: false
        type: string

env:
  JAVA_VERSION: '8'

jobs:
  # Job 1: Build JAR package
  build-jar:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - uses: actions/checkout@v4.1.7

    - name: Set up JDK 8
      uses: actions/setup-java@v4.2.1
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: 'maven'

    - name: Get tag version
      id: get_tag
      run: |
        if [ "${{ github.event.inputs.tag }}" != "" ]; then
          echo "VERSION=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        fi

    - name: Build with Maven
      run: mvn clean package -DskipTests
      env:
        MAVEN_OPTS: "-Xms512m -Xmx1024m"

    - name: Copy JAR to output folder
      run: |
        mkdir -p release
        cp lis-admin/target/lis-admin.jar release/lis-admin.jar

    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4.3.0
      with:
        name: lis-admin-jar
        path: release/lis-admin.jar
        retention-days: 5

  # Job 2: Build Docker image (optional - only if credentials are configured)
  build-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: secrets.DOCKER_HUB_USERNAME != '' && secrets.DOCKER_HUB_ACCESS_TOKEN != ''

    steps:
    - uses: actions/checkout@v4.1.7

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

    - name: Get tag version
      id: get_tag
      run: |
        if [ "${{ github.event.inputs.tag }}" != "" ]; then
          echo "VERSION=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        fi

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKER_HUB_USERNAME }}/lis
        tags: |
          type=raw,value=${{ steps.get_tag.outputs.VERSION }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Save Docker image info
      run: |
        echo "${{ steps.meta.outputs.tags }}" > docker-tags.txt
        echo "${{ secrets.DOCKER_HUB_USERNAME }}/lis:${{ steps.get_tag.outputs.VERSION }}" > docker-full-tag.txt

    - name: Upload Docker metadata
      uses: actions/upload-artifact@v4.3.0
      with:
        name: docker-metadata
        path: |
          docker-tags.txt
          docker-full-tag.txt
        retention-days: 5

  # Job 3: Create Release (depends on JAR build, Docker is optional)
  release:
    needs: [build-jar]
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Download JAR artifact
      uses: actions/download-artifact@v4.3.0
      with:
        name: lis-admin-jar
        path: .

    - name: Get tag version
      id: get_tag
      run: |
        if [ "${{ github.event.inputs.tag }}" != "" ]; then
          echo "VERSION=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        fi

    - name: Check if Docker credentials are available
      id: check_docker
      run: |
        if [ "${{ secrets.DOCKER_HUB_USERNAME }}" != "" ] && [ "${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}" != "" ]; then
          echo "HAS_DOCKER=true" >> $GITHUB_OUTPUT
        else
          echo "HAS_DOCKER=false" >> $GITHUB_OUTPUT
        fi

    - name: Download Docker metadata (if available)
      if: ${{ steps.check_docker.outputs.HAS_DOCKER == 'true' }}
      uses: actions/download-artifact@v4.3.0
      with:
        name: docker-metadata
        path: .

    - name: Read Docker tag (if available)
      id: docker_tag
      if: ${{ steps.check_docker.outputs.HAS_DOCKER == 'true' }}
      run: |
        DOCKER_FULL_TAG=$(cat docker-full-tag.txt)
        echo "FULL_TAG=$DOCKER_FULL_TAG" >> $GITHUB_OUTPUT

    - name: Generate release body
      id: release_body
      run: |
        BODY="## 📦 LIS 物流系统 ${{ steps.get_tag.outputs.VERSION }}\n\n"
        
        if [ "${{ steps.check_docker.outputs.HAS_DOCKER }}" == "true" ]; then
          BODY="$BODY### 🔗 Docker 镜像\n\`\`\`\ndocker pull ${{ steps.docker_tag.outputs.FULL_TAG }}\n\`\`\`\n\n### 🚀 快速启动（Docker Compose）\n\`\`\`yaml\nversion: '3.8'\nservices:\n  mysql:\n    image: mysql:8.0\n    environment:\n      MYSQL_ROOT_PASSWORD: root123\n      MYSQL_DATABASE: hhhh\n      MYSQL_USER: hhhh\n      MYSQL_PASSWORD: hhhh123\n    ports:\n      - \"3306:3306\"\n\n  lis:\n    image: ${{ steps.docker_tag.outputs.FULL_TAG }}\n    depends_on:\n      mysql:\n        condition: service_started\n    ports:\n      - \"8808:8808\"\n    environment:\n      CONFIG_DB_HOST: mysql\n      CONFIG_DB_NAME: hhhh\n      CONFIG_DB_USER: hhhh\n      CONFIG_DB_PASSWORD: hhhh123\n\`\`\`\n\n"
        else
          BODY="$BODY### ⚠️ Docker 镜像未构建\nDocker Hub 凭据未配置，如需构建 Docker 镜像，请设置 DOCKER_HUB_USERNAME 和 DOCKER_HUB_ACCESS_TOKEN\n\n"
        fi
        
        BODY="$BODY### 📋 变更日志\n请查看 [GitHub Releases](https://github.com/${{ github.repository }}/releases)\n\n### 🔧 传统部署\n1. 下载 \`lis-admin.jar\`\n2. 配置 \`config.json\`\n3. 运行 \`java -jar -Xmx1024M -Xms256M lis-admin.jar\`\n\n默认管理员账号：\`admin\` / \`admin123\`"
        
        echo "BODY<<EOF" >> $GITHUB_OUTPUT
        echo "$BODY" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.get_tag.outputs.VERSION }}
        name: LIS 物流系统 ${{ steps.get_tag.outputs.VERSION }}
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          lis-admin.jar
        body: ${{ steps.release_body.outputs.BODY }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}