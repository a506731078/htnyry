name: Build and Push Docker Image

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - uses: actions/checkout@v4.1.7
      with:
        fetch-depth: 1

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      if: github.event_name != 'pull_request' && secrets.DOCKER_HUB_USERNAME != '' && secrets.DOCKER_HUB_ACCESS_TOKEN != ''
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

    - name: Check if Docker credentials are available
      id: check_credentials
      run: |
        if [ "${{ secrets.DOCKER_HUB_USERNAME }}" != "" ] && [ "${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}" != "" ]; then
          echo "HAS_CREDENTIALS=true" >> $GITHUB_OUTPUT
        else
          echo "HAS_CREDENTIALS=false" >> $GITHUB_OUTPUT
        fi

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKER_HUB_USERNAME || 'ghcr.io/test' }}/lis
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix=

    - name: Build only (no push)
      if: ${{ steps.check_credentials.outputs.HAS_CREDENTIALS == 'false' }}
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push
      if: ${{ steps.check_credentials.outputs.HAS_CREDENTIALS == 'true' && github.event_name != 'pull_request' }}
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Upload Docker metadata
      uses: actions/upload-artifact@v4.3.0
      with:
        name: docker-metadata
        path: |
          ${{ steps.meta.outputs.tags }}
          ${{ steps.meta.outputs.labels }}
        retention-days: 30

    - name: Show Docker credentials status
      run: |
        if [ "${{ steps.check_credentials.outputs.HAS_CREDENTIALS }}" == "true" ]; then
          echo "✅ Docker Hub credentials configured - image will be pushed"
        else
          echo "⚠️ Docker Hub credentials not configured - image built but not pushed"
          echo "Please set DOCKER_HUB_USERNAME and DOCKER_HUB_ACCESS_TOKEN in repository secrets"
        fi