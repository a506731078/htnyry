name: Build and Push Docker Image

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - uses: actions/checkout@v4.1.7
      with:
        fetch-depth: 1

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Check if Docker Hub credentials are available
      id: check_dockerhub
      run: |
        if [ "${{ secrets.DOCKER_HUB_USERNAME }}" != "" ] && [ "${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}" != "" ]; then
          echo "HAS_DOCKERHUB=true" >> $GITHUB_OUTPUT
        else
          echo "HAS_DOCKERHUB=false" >> $GITHUB_OUTPUT
        fi

    - name: Login to Docker Hub
      if: ${{ steps.check_dockerhub.outputs.HAS_DOCKERHUB == 'true' && github.event_name != 'pull_request' }}
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

    - name: Login to GitHub Container Registry
      if: ${{ steps.check_dockerhub.outputs.HAS_DOCKERHUB == 'false' && github.event_name != 'pull_request' }}
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Get short SHA
      id: get_sha
      run: echo "SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Get current date
      id: get_date
      run: echo "DATE=$(date +%Y%m%d)" >> $GITHUB_OUTPUT

    - name: Extract metadata for Docker Hub
      id: meta_dockerhub
      if: ${{ steps.check_dockerhub.outputs.HAS_DOCKERHUB == 'true' }}
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKER_HUB_USERNAME }}/lis
        tags: |
          type=raw,value=latest
          type=raw,value=${{ steps.get_date.outputs.DATE }}-${{ steps.get_sha.outputs.SHA }}
          type=ref,event=branch
          type=sha,prefix=

    - name: Extract metadata for GHCR
      id: meta_ghcr
      if: ${{ steps.check_dockerhub.outputs.HAS_DOCKERHUB == 'false' }}
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository_owner }}/lis
        tags: |
          type=raw,value=latest
          type=raw,value=${{ steps.get_date.outputs.DATE }}-${{ steps.get_sha.outputs.SHA }}
          type=ref,event=branch
          type=sha,prefix=

    - name: Build only (PR or no credentials)
      if: ${{ github.event_name == 'pull_request' }}
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: ${{ steps.meta_dockerhub.outputs.tags || steps.meta_ghcr.outputs.tags }}
        labels: ${{ steps.meta_dockerhub.outputs.labels || steps.meta_ghcr.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push to Docker Hub
      if: ${{ steps.check_dockerhub.outputs.HAS_DOCKERHUB == 'true' && github.event_name != 'pull_request' }}
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta_dockerhub.outputs.tags }}
        labels: ${{ steps.meta_dockerhub.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push to GHCR
      if: ${{ steps.check_dockerhub.outputs.HAS_DOCKERHUB == 'false' && github.event_name != 'pull_request' }}
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta_ghcr.outputs.tags }}
        labels: ${{ steps.meta_ghcr.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Show push status
      run: |
        if [ "${{ github.event_name }}" == "pull_request" ]; then
          echo "⚠️ PR build - image built but not pushed"
        elif [ "${{ steps.check_dockerhub.outputs.HAS_DOCKERHUB }}" == "true" ]; then
          echo "✅ Pushed to Docker Hub: ${{ secrets.DOCKER_HUB_USERNAME }}/lis"
        else
          echo "✅ Pushed to GHCR: ghcr.io/${{ github.repository_owner }}/lis"
        fi