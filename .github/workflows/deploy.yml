name: Build and Deploy to Server

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build with Maven
      run: mvn clean package -DskipTests
      env:
        MAVEN_OPTS: "-Xms512m -Xmx1024m"

    - name: Copy deployment files
      run: |
        mkdir -p deploy
        cp lis-admin/target/lis-admin.jar deploy/
        cp config.json deploy/
        cp -r web deploy/

    - name: Upload to Server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        port: ${{ secrets.SERVER_PORT }}
        source: "deploy/*"
        target: "${{ secrets.SERVER_DEPLOY_PATH }}"
        strip_components: 1

    - name: Restart Application
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        port: ${{ secrets.SERVER_PORT }}
        script: |
          cd ${{ secrets.SERVER_DEPLOY_PATH }}
          # Stop old process
          pkill -f lis-admin.jar || true
          # Start new process
          nohup java -jar -Xmx1024M -Xms256M lis-admin.jar > app.log 2>&1 &
          sleep 5
          # Check if running
          if pgrep -f lis-admin.jar > /dev/null; then
            echo "Application started successfully"
          else
            echo "Application failed to start"
            cat app.log
          fi