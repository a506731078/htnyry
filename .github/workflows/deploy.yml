name: Build and Deploy to Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 1.8
      uses: actions/setup-java@v3
      with:
        java-version: '1.8'
        distribution: 'temurin'

    - name: Cache Maven packages
      uses: actions/cache@v3
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Copy deployment files
      run: |
        mkdir -p deploy
        cp lis-admin/target/lis-admin.jar deploy/
        cp config.json deploy/
        cp -r web deploy/

    - name: Upload to Server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        port: ${{ secrets.SERVER_PORT }}
        source: "deploy/*"
        target: "${{ secrets.SERVER_DEPLOY_PATH }}"
        strip_components: 1

    - name: Restart Application
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        port: ${{ secrets.SERVER_PORT }}
        script: |
          cd ${{ secrets.SERVER_DEPLOY_PATH }}
          # Stop old process
          pkill -f lis-admin.jar || true
          # Start new process
          nohup java -jar -Xmx1024M -Xms256M lis-admin.jar > app.log 2>&1 &
          sleep 5
          # Check if running
          if pgrep -f lis-admin.jar > /dev/null; then
            echo "Application started successfully"
          else
            echo "Application failed to start"
            cat app.log
          fi
